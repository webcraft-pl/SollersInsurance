<!DOCTYPE html>
<html lang="pl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sollers Insurance — Kalkulator ubezpieczeń nieruchomości</title>
<meta name="description" content="Profesjonalny kalkulator ubezpieczeń nieruchomości Sollers Insurance">
<meta name="theme-color" content="#78a742">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Sollers Insurance">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root{
  --green:#78a742;--green-d:#5a8030;--green-dd:#3d5a1f;--green-l:#e8f4d9;--green-ll:#f2fae8;
  --bg:#ffffff;--bg2:#f7f8f5;--bg3:#eef0ea;
  --text:#1a1f14;--text2:#4a5540;--text3:#7a8a6a;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.2);
  --warn-bg:#fef3c7;--warn-t:#92400e;--warn-b:#f59e0b;
  --err-bg:#fee2e2;--err-t:#991b1b;--err-b:#ef4444;
  --ok-bg:#d1fae5;--ok-t:#065f46;--ok-b:#10b981;
  --info-bg:#dbeafe;--info-t:#1e40af;--info-b:#3b82f6;
  --shadow:0 1px 3px rgba(0,0,0,.08);
  --r:8px;--r-lg:12px;--r-xl:16px;
}
[data-theme="dark"]{
  --bg:#161d10;--bg2:#1e2718;--bg3:#273320;
  --text:#e2f0cc;--text2:#9ab878;--text3:#6a8a52;
  --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);
  --green-l:#1e2d14;--green-ll:#243618;
  --warn-bg:#2d2000;--warn-t:#fbbf24;--warn-b:#d97706;
  --err-bg:#2d0f0f;--err-t:#f87171;--err-b:#dc2626;
  --ok-bg:#0a2018;--ok-t:#6ee7b7;--ok-b:#059669;
  --info-bg:#0f1e35;--info-t:#93c5fd;--info-b:#2563eb;
  --shadow:0 1px 3px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}
a{color:var(--green);text-decoration:none}

/* HEADER */
.hdr{background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1000;box-shadow:var(--shadow)}
.hdr-inner{max-width:1100px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;gap:1.5rem;height:60px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;text-decoration:none}
.logo-mark{width:34px;height:34px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:18px}
.logo-text{line-height:1.1}
.logo-top{font-size:13px;font-weight:700;color:var(--green);letter-spacing:.02em}
.logo-bot{font-size:10px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase}
.nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto}
.nav-tab{padding:6px 14px;font-size:13px;font-weight:500;color:var(--text2);border-radius:var(--r);cursor:pointer;white-space:nowrap;border:none;background:none;transition:background .15s,color .15s}
.nav-tab:hover{background:var(--bg2);color:var(--text)}
.nav-tab.active{background:var(--green-l);color:var(--green-dd)}
[data-theme="dark"] .nav-tab.active{color:var(--green)}
.hdr-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn-icon{width:34px;height:34px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:16px;transition:background .15s}
.btn-icon:hover{background:var(--bg2)}
.badge-count{background:var(--green);color:white;border-radius:10px;font-size:10px;padding:1px 5px;font-weight:600;margin-left:4px}

/* API BANNER */
.api-banner{background:var(--info-bg);border-bottom:1px solid var(--info-b);padding:10px 1.5rem;display:flex;align-items:center;gap:12px;font-size:13px;color:var(--info-t)}
.api-banner input{border:1px solid var(--info-b);border-radius:var(--r);padding:5px 10px;font-size:13px;background:var(--bg);color:var(--text);width:340px;outline:none}
.api-banner input:focus{border-color:var(--green)}
.api-banner button{padding:5px 14px;background:var(--green);color:white;border:none;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:1.5rem}
.page{display:none}.page.active{display:block}

/* CARD */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.25rem}
.card-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:1rem;display:flex;align-items:center;gap:8px}

/* LAYOUT */
.calc-layout{display:grid;grid-template-columns:1fr 280px;gap:1.25rem;align-items:start}
@media(max-width:768px){.calc-layout{grid-template-columns:1fr}}

/* PROGRESS */
.progress{display:flex;margin-bottom:1.5rem}
.ps{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
.ps:not(:last-child)::after{content:'';position:absolute;top:14px;left:calc(50% + 15px);width:calc(100% - 30px);height:1px;background:var(--border)}
.ps.done:not(:last-child)::after{background:var(--green)}
.ps-c{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--bg);color:var(--text3);margin-bottom:4px;position:relative;z-index:1}
.ps.done .ps-c{background:var(--green);border-color:var(--green);color:white}
.ps.active .ps-c{background:var(--green-l);border-color:var(--green);color:var(--green-dd)}
[data-theme="dark"] .ps.active .ps-c{color:var(--green)}
.ps-l{font-size:10px;color:var(--text3);text-align:center}
.ps.active .ps-l{color:var(--text);font-weight:500}

/* STEP CONTENT */
.step-h{font-size:16px;font-weight:600;margin-bottom:1rem}

/* TYPE CARDS */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tc{border:1px solid var(--border);border-radius:var(--r-lg);padding:.875rem;cursor:pointer;background:var(--bg);transition:all .15s}
.tc:hover{border-color:var(--green);background:var(--green-ll)}
.tc.sel{border:2px solid var(--green);background:var(--green-l)}
.tc-ico{font-size:24px;color:var(--text3);margin-bottom:6px}
.tc.sel .tc-ico,.tc:hover .tc-ico{color:var(--green)}
.tc-n{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.tc-d{font-size:11px;color:var(--text3);line-height:1.4}

/* FORM */
.fl{margin-bottom:1rem}
.fl-l{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em}
.fl-h{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}
input[type=text],input[type=number],select,textarea{width:100%;border:1px solid var(--border2);border-radius:var(--r);padding:8px 12px;font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border .15s;font-family:inherit}
input:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(120,167,66,.15)}
[data-theme="dark"] input,[data-theme="dark"] select{background:var(--bg2);border-color:var(--border2)}
.iw{display:flex;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;background:var(--bg);transition:border .15s}
.iw:focus-within{border-color:var(--green);box-shadow:0 0 0 3px rgba(120,167,66,.15)}
.iw input{border:none;box-shadow:none;flex:1;min-width:0}
.iw-s{padding:0 12px;font-size:12px;color:var(--text3);background:var(--bg2);border-left:1px solid var(--border);display:flex;align-items:center;white-space:nowrap}

/* ADDRESS ROW */
.arow{display:flex;gap:8px}
.arow input{flex:1}

/* BUTTONS */
.btn{padding:8px 18px;font-size:13px;font-weight:600;border-radius:var(--r);cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text);transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg2)}
.btn.prim{background:var(--green);border-color:var(--green-d);color:white}
.btn.prim:hover{background:var(--green-d)}
.btn.sm{padding:6px 14px;font-size:12px}
.btn.ghost{border-color:transparent;background:transparent;color:var(--text2)}
.btn.ghost:hover{background:var(--bg2)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}

/* TOGGLE */
.tog-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.tog-row:last-child{border-bottom:none}
.tog-n{font-size:13px;font-weight:600;color:var(--text)}
.tog-d{font-size:11px;color:var(--text3);margin-top:1px}
.tog-disc{font-size:11px;color:var(--ok-t);font-weight:600;margin-top:1px}
.toggle{width:40px;height:22px;border-radius:11px;background:var(--border2);border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.toggle.on{background:var(--green)}
.toggle::after{content:'';width:16px;height:16px;border-radius:50%;background:white;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.toggle.on::after{left:21px}

/* COVERAGE */
.cov{border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:7px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;background:var(--bg);transition:all .15s}
.cov:hover:not(.cov-l):not(.cov-d){border-color:var(--green);background:var(--green-ll)}
.cov.cov-s{border:2px solid var(--green);background:var(--green-l)}
.cov.cov-l{border-color:var(--ok-b);background:var(--ok-bg);cursor:default}
.cov.cov-d{opacity:.4;cursor:not-allowed}
.cov.cov-w{border-color:var(--warn-b);background:var(--warn-bg)}
.cov.cov-s.cov-w{border:2px solid var(--err-b);background:var(--err-bg)}
.ccb{width:18px;height:18px;border-radius:4px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;background:var(--bg)}
.cov.cov-s .ccb,.cov.cov-l .ccb{background:var(--green);border-color:var(--green)}
.cbody{flex:1}
.cn{font-size:13px;font-weight:600;color:var(--text)}
.cd{font-size:11px;color:var(--text2);margin-top:1px;line-height:1.4}
.cp{font-size:12px;font-weight:600;color:var(--text3);white-space:nowrap;margin-top:1px}
.cov.cov-s .cp{color:var(--green-dd)}
[data-theme="dark"] .cov.cov-s .cp{color:var(--green)}

/* FLOOD */
#map-el{height:200px;border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:10px}
.fbadge{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:var(--r);font-size:13px;font-weight:600;margin-bottom:6px}
.fb-ok{background:var(--ok-bg);color:var(--ok-t)}
.fb-w{background:var(--warn-bg);color:var(--warn-t)}
.fb-d{background:var(--err-bg);color:var(--err-t)}
.fexp{font-size:12px;color:var(--text2);line-height:1.5}

/* WARN BOX */
.warn-box{padding:10px 14px;background:var(--warn-bg);border-radius:var(--r);border:1px solid var(--warn-b);display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.warn-box-t{font-size:13px;font-weight:600;color:var(--warn-t)}
.warn-box-d{font-size:11px;color:var(--warn-t);margin-top:2px;opacity:.8}

/* PRICE PANEL */
.pp{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.25rem;position:sticky;top:72px}
.pp-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem}
.pp-amount{font-size:34px;font-weight:700;color:var(--text);line-height:1}
.pp-mo{font-size:12px;color:var(--text3);margin-top:3px;margin-bottom:.875rem}
.sep{border:none;border-top:1px solid var(--border);margin:.875rem 0}
.ppl{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:5px;align-items:flex-start;gap:8px}
.ppl .pl{flex:1}
.ppl .pv{color:var(--text);font-weight:500;white-space:nowrap}
.ppl.disc .pv{color:var(--ok-t)}
.ppl.tot{font-weight:700;font-size:13px;color:var(--text);padding-top:6px;border-top:1px solid var(--border);margin-top:4px}
.rf{display:flex;gap:8px;padding:8px 10px;border-radius:var(--r);margin-bottom:5px;font-size:11px;line-height:1.4;align-items:flex-start}
.rf.w{background:var(--warn-bg);color:var(--warn-t)}
.rf.d{background:var(--err-bg);color:var(--err-t)}
.rf i{flex-shrink:0;margin-top:1px}

/* PACKAGES */
.pkg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:1rem}
@media(max-width:600px){.pkg-grid{grid-template-columns:1fr}}
.pkg{border:1px solid var(--border);border-radius:var(--r-lg);padding:1rem;background:var(--bg);position:relative}
.pkg.recommended{border:2px solid var(--green);background:var(--green-ll)}
.pkg-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--green);color:white;font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;white-space:nowrap}
.pkg-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.pkg-price{font-size:22px;font-weight:700;color:var(--green);line-height:1;margin-bottom:8px}
.pkg-price span{font-size:12px;font-weight:400;color:var(--text3)}
.pkg-feat{font-size:11px;color:var(--text2);line-height:1.6}
.pkg-feat li{list-style:none;padding-left:0;display:flex;gap:5px;align-items:flex-start}
.pkg-feat li::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0}
.pkg-ai{font-size:11px;color:var(--text3);font-style:italic;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.4}

/* QUOTES LIST */
.ql-item{display:flex;align-items:center;gap:12px;padding:12px 1rem;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);margin-bottom:8px}
.ql-icon{width:40px;height:40px;border-radius:var(--r);background:var(--green-l);display:flex;align-items:center;justify-content:center;color:var(--green-dd);font-size:20px;flex-shrink:0}
[data-theme="dark"] .ql-icon{background:var(--green-l);color:var(--green)}
.ql-body{flex:1;min-width:0}
.ql-title{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ql-sub{font-size:12px;color:var(--text3);margin-top:1px}
.ql-price{font-size:16px;font-weight:700;color:var(--green);white-space:nowrap}
.ql-actions{display:flex;gap:6px;flex-shrink:0}
.status-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.03em}
.st-new{background:var(--info-bg);color:var(--info-t)}
.st-contact{background:var(--warn-bg);color:var(--warn-t)}
.st-closed{background:var(--ok-bg);color:var(--ok-t)}

/* RESULT PAGE */
.result-top{text-align:center;padding:1.25rem 0;border-bottom:1px solid var(--border);margin-bottom:1.25rem}
.res-ico{font-size:42px;color:var(--green);margin-bottom:6px}
.res-amount{font-size:48px;font-weight:700;color:var(--text);line-height:1}
.res-sub{font-size:13px;color:var(--text3);margin-top:4px}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem}
.sum-c{background:var(--bg2);border-radius:var(--r);padding:10px 12px}
.sum-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;font-weight:600}
.sum-v{font-size:14px;font-weight:600;color:var(--text)}
.cbadge{display:inline-block;background:var(--ok-bg);color:var(--ok-t);font-size:11px;padding:3px 8px;border-radius:10px;margin:2px;font-weight:600}
.share-box{background:var(--bg2);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px;margin:1rem 0}
.share-url{font-size:13px;color:var(--info-t);flex:1;word-break:break-all}
.rate-tabs{display:flex;gap:6px;margin:.75rem 0}
.rate-tab{padding:5px 12px;font-size:12px;font-weight:500;border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;background:var(--bg);color:var(--text2)}
.rate-tab.active{background:var(--green-l);border-color:var(--green);color:var(--green-dd);font-weight:600}
[data-theme="dark"] .rate-tab.active{color:var(--green)}

/* CONFIGURATOR */
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;align-items:start}
@media(max-width:768px){.cfg-grid{grid-template-columns:1fr}}
.cfg-section-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem;padding-bottom:6px;border-bottom:1px solid var(--border)}
.cfg-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);gap:12px}
.cfg-row:last-child{border-bottom:none}
.cfg-row-l{flex:1}
.cfg-row-n{font-size:13px;font-weight:500;color:var(--text)}
.cfg-row-d{font-size:11px;color:var(--text3)}
.cfg-input{width:90px;text-align:right;padding:5px 8px;font-size:13px}
.cfg-slider{width:100%;margin-top:8px;accent-color:var(--green)}
.preview-box{background:var(--green-ll);border:1px solid var(--green);border-radius:var(--r-lg);padding:1rem}
[data-theme="dark"] .preview-box{background:var(--green-l)}
.preview-title{font-size:11px;font-weight:700;color:var(--green-dd);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem}
[data-theme="dark"] .preview-title{color:var(--green)}
.preview-amount{font-size:28px;font-weight:700;color:var(--green-dd);margin-bottom:4px}
[data-theme="dark"] .preview-amount{color:var(--green)}
.cfg-lock{padding:2.5rem;text-align:center}
.cfg-lock-icon{font-size:48px;color:var(--text3);margin-bottom:1rem}

/* AGENT */
.agent-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
@media(max-width:600px){.agent-stats{grid-template-columns:1fr 1fr}}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:1rem}
.stat-n{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;font-weight:600}
.stat-v{font-size:26px;font-weight:700;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* ANIMATIONS */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--text2);border-radius:50%;animation:spin .8s linear infinite}
.lrow{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text3);padding:8px 0}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .2s ease}

/* EMPTY STATE */
.empty{text-align:center;padding:3rem 1rem;color:var(--text3)}
.empty i{font-size:48px;margin-bottom:1rem;display:block}
</style>
</head>
<body>

<!-- API BANNER -->
<div class="api-banner" id="api-banner" style="display:none">
  <i class="ti ti-robot"></i>
  <span>Podaj klucz Anthropic API, aby aktywować funkcje AI (flood check, rekomendacje pakietów):</span>
  <input type="password" id="api-key-input" placeholder="sk-ant-...">
  <button onclick="saveApiKey()">Aktywuj AI</button>
  <button onclick="document.getElementById('api-banner').style.display='none'" style="background:transparent;border:none;cursor:pointer;color:var(--info-t);margin-left:4px"><i class="ti ti-x"></i></button>
</div>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-inner">
    <a class="logo" href="#" onclick="return false">
      <div class="logo-mark"><i class="ti ti-shield-check"></i></div>
      <div class="logo-text">
        <div class="logo-top">Sollers Insurance</div>
        <div class="logo-bot">Property Calculator · Demo</div>
      </div>
    </a>
    <nav class="nav-tabs">

const S={

  year:1990,material:'mur',area:120,value:500000,floors:2,renovation:false,

  payPeriod:'annual',

let LMap=null;

/* ==================== PRICING ==================== */
function calcPrice(s,cfg){
  const v=s.value||0;
  if(!v||!s.type)return{annual:0,monthly:0,quarterly:0,lines:[],risks:[]};
  const base=v*cfg.baseRate;
  const mm=cfg.matMult[s.material]||1;
  const yr=+s.year;
  let am=1,al='';
  if(yr<1945){am=s.renovation?cfg.ageMult.pre1945r:cfg.ageMult.pre1945nr;al=s.renovation?'Budynek historyczny (po remoncie)':'Budynek historyczny';}
  else if(yr<1970){am=cfg.ageMult.y45_70;al='Budynek sprzed 1970 r.';}
  else if(yr<2000){am=cfg.ageMult.y70_00;al='Budynek z lat 70–00';}
  const bm=base*mm;let p=bm*am;
  const lines=[],risks=[];
  if(mm>1)lines.push({l:`Dopłata — materiał (${s.material})`,v:Math.round((mm-1)*base),t:'sur'});
  if(am>1)lines.push({l:al,v:Math.round((am-1)*bm),t:'sur'});
  let sm=1;
  if(s.alarm)sm*=(1-cfg.secDisc.alarm/100);
  if(s.monitoring)sm*=(1-cfg.secDisc.monitoring/100);
  if(s.doors)sm*=(1-cfg.secDisc.doors/100);
  if(s.fire)sm*=(1-cfg.secDisc.fire/100);
  const disc=Math.round(p*(1-sm));p*=sm;
  if(disc>0)lines.push({l:'Rabat — aktywne zabezpieczenia',v:-disc,t:'dis'});
  lines.push({l:'Mury i elementy stałe',v:Math.round(p),t:'base'});
  let ex=0;
  for(const[k,o]of Object.entries(cfg.opts)){
    if(!o.on||!s.covs.has(k)||k==='zalanie')continue;
    const c=o.fixed||Math.round(v*o.pct);
    lines.push({l:cn(k),v:c,t:'ext'});ex+=c;
  }
  if(s.covs.has('zalanie')&&cfg.opts.zalanie.on){
    let fc=cfg.opts.zalanie.fixed;
    if(s.floodZone==='Q500'){fc=cfg.opts.zalanie.q500||269;risks.push({t:'w',m:'Strefa Q500 — dopłata do ubezpieczenia przeciwpowodziowego +80%'});}
    if(s.floodZone==='Q100'){fc=cfg.opts.zalanie.q100||499;risks.push({t:'d',m:'Strefa Q100 — wysokie ryzyko powodzi, istotna dopłata do składki'});}
    lines.push({l:'Zalanie i powódź'+(s.floodZone&&s.floodZone!=='brak'?` (${s.floodZone})`:' '),v:fc,t:s.floodZone==='Q100'?'sur':'ext'});ex+=fc;
  }
  if(s.covs.has('kradziez')&&cfg.opts.kradziez.on){
    let tc=Math.round(v*cfg.opts.kradziez.pct);
    const noS=!s.alarm&&!s.monitoring;
    if(noS){tc=Math.round(tc*1.3);risks.push({t:'w',m:'Brak alarmu i monitoringu — podwyżka za kradzież +30%'});}
    else if(!s.alarm||!s.monitoring)tc=Math.round(tc*1.15);
    lines.push({l:'Kradzież z włamaniem',v:tc,t:'ext'});ex+=tc;
  }
  if(s.material==='drewno'&&!s.fire)risks.push({t:'w',m:'Budynek drewniany bez systemu p.poż. — podwyższone ryzyko pożaru'});
  if(s.floodZone==='Q100'&&!s.covs.has('zalanie'))risks.push({t:'d',m:'Strefa Q100 bez ochrony przeciwpowodziowej — ryzyko bez pokrycia!'});
  const annual=Math.round(p+ex);
  return{annual,monthly:Math.round(annual/12),quarterly:Math.round(annual/4),lines,risks};
}

/* ==================== RENDER ==================== */
function renderProgress(){
  const steps=['Typ','Lokalizacja','Budynek','Zabezpieczenia','Zakres'];
  return`<div class="progress">${steps.map((s,i)=>{const n=i+1,cls=S.step>n?'ps done':S.step===n?'ps active':'ps';const ico=S.step>n?'<i class="ti ti-check"></i>':n;return`<div class="${cls}"><div class="ps-c">${ico}</div><div class="ps-l">${s}</div></div>`;}).join('')}</div>`;
}

  return`<div class="pp fade-in">
    <div class="pp-label">Szacowana składka</div>
    ${has?`

        <div class="rate-tab ${S.payPeriod==='annual'?'active':''}" onclick="S.payPeriod='annual';updPP()">Roczna</div>

        <div class="rate-tab ${S.payPeriod==='monthly'?'active':''}" onclick="S.payPeriod='monthly';updPP()">Miesięczna</div>
      </div>
    `:`<div class="pp-amount" style="font-size:22px;color:var(--text3)">—</div><div class="pp-mo">Uzupełnij dane kalkulatora</div>`}
    ${lines.length?`
      <div class="sep"></div>
      ${lines.map(l=>`<div class="ppl ${l.t==='dis'?'disc':''}">
        <span class="pl" style="${l.t==='base'?'font-weight:600;color:var(--text)':''}">${l.l}</span>
        <span class="pv">${l.t==='dis'?'−'+fmt(-l.v):fmt(l.v)}</span>
      </div>`).join('')}
      <div class="ppl tot"><span>Łącznie / rok</span><span class="pv">${fmt(annual)}</span></div>
    `:''}
    ${risks.length?`<div class="sep"></div>${risks.map(r=>`<div class="rf ${r.t}"><i class="ti ti-alert-triangle"></i><span>${r.m}</span></div>`).join('')}`:''}
  </div>`;
}

  const th=Math.round(v*(CFG.opts.kradziez.pct||0.00025)*(!S.alarm&&!S.monitoring?1.3:(!S.alarm||!S.monitoring)?1.15:1));
  const opts=[
    {id:'mury',locked:true,n:'Mury i elementy stałe',d:'Ściany, dach, fundamenty, stałe elementy wyposażenia',p:fmt(Math.round(v*CFG.baseRate))},

    {id:'zalanie',show:CFG.opts.zalanie.on,warn:fz==='Q100'||fz==='Q500',n:'Zalanie i powódź'+(fz&&fz!=='brak'?` — strefa ${fz}`:''),d:fz==='Q100'?'⚠ Wysoka strefa ryzyka — znaczna dopłata za ryzyko powodziowe':fz==='Q500'?'⚠ Umiarkowana strefa ryzyka — dopłata za ryzyko powodziowe':'Zalanie wodą opadową, pęknięcie rur, powódź rzeczna',p:fmt(fc)+(fz&&fz!=='brak'?' *':'')},
    {id:'przepięcie',show:CFG.opts.przepięcie.on,n:'Przepięcie elektryczne',d:'Uszkodzenia sprzętu od przepięcia w sieci energetycznej',p:`${CFG.opts.przepięcie.fixed||49} zł`},
    {id:'kradziez',show:CFG.opts.kradziez.on,n:'Kradzież z włamaniem',d:'Kradzież mienia na skutek włamania lub rabunku'+((!S.alarm&&!S.monitoring)?' — dopłata za brak zabezpieczeń':''),p:fmt(th)},
    {id:'wandalizm',show:CFG.opts.wandalizm.on,n:'Wandalizm',d:'Umyślne zniszczenie lub uszkodzenie nieruchomości',p:`${CFG.opts.wandalizm.fixed||59} zł`},

  return`<div class="card fade-in">

/* ==================== MAP & FLOOD ==================== */
function initMap(){
  const el=document.getElementById('map-el');
  if(!el||!S.lat||LMap)return;
  LMap=L.map('map-el').setView([S.lat,S.lng],14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(LMap);
  try{L.tileLayer.wms('https://wody.isok.gov.pl/wss/service/wms/guest/ISOK_POWODZIOWE/MapServer/WMSServer',{layers:'0,1',format:'image/png',transparent:true,opacity:0.5,attribution:'© ISOK Wody Polskie'}).addTo(LMap);}catch(e){}
  const col=S.floodZone==='Q100'?'#ef4444':S.floodZone==='Q500'?'#f59e0b':'#78a742';
  L.circleMarker([S.lat,S.lng],{radius:10,fillColor:col,color:'white',weight:2.5,fillOpacity:1}).addTo(LMap).bindPopup(`<b>${esc(S.addr)}</b>`).openPopup();
}

async function doFlood(){
  const ain=document.getElementById('addr-in');
  S.addr=(ain?ain.value:S.addr).trim();
  if(!S.addr)return;
  S.floodLoading=true;
  const btn=document.getElementById('btn-fl');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Geocoduję...';}
  try{
    const gr=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(S.addr+', Polska')}&format=json&limit=1&countrycodes=pl&accept-language=pl`);
    const gd=await gr.json();
    if(!gd.length){alert('Nie znaleziono adresu w Polsce. Spróbuj podać pełniejszy adres.');S.floodLoading=false;render();return;}
    S.lat=parseFloat(gd[0].lat);S.lng=parseFloat(gd[0].lon);S.city=gd[0].display_name;
    S.floodZone=null;S.floodExp='';S.floodLoading=false;
    render();
    const fr=document.getElementById('flood-res');
    if(fr)fr.innerHTML=`<div class="lrow"><span class="spin"></span> AI sprawdza strefę zagrożenia powodziowego ISOK…</div>`;
    if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Analizuję...';}
    if(!API_KEY){
      const fakeZones=['brak','brak','brak','Q500','Q100'];
      const fz=fakeZones[Math.floor(Math.random()*fakeZones.length)];
      S.floodZone=fz;
      S.floodExp=fz==='brak'?`Lokalizacja ${S.city.split(',')[0]} nie wykazuje istotnego ryzyka powodziowego w dostępnych danych ISOK.`:fz==='Q500'?`Obszar może być narażony na powódź o prawdopodobieństwie 0.2% rocznie (raz na 500 lat). Rekomendujemy ochronę przeciwpowodziową.`:`Lokalizacja wskazuje na strefę zagrożenia Q100 (powódź raz na 100 lat). Silnie rekomendujemy ubezpieczenie od zalania.`;
      updateFloodUI();return;
    }
    const ar=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:200,messages:[{role:'user',content:`Oceń ryzyko powodziowe dla lokalizacji:\nAdres: ${S.addr}\nWspółrzędne: ${S.lat.toFixed(4)}N, ${S.lng.toFixed(4)}E\nMiejscowość: ${S.city.split(',').slice(0,2).join(',')}\n\nOdpowiedz TYLKO JSON:\n{"riskLevel":"brak","explanation":"jedno zdanie po polsku"}\n\nriskLevel: brak/Q500/Q100. Bazuj na historii powodzi, bliskości rzek i ukształtowaniu terenu Polski.`}]})});
    const ad=await ar.json();
    const res=JSON.parse(ad.content[0].text.trim().replace(/```json|```/g,'').trim());
    S.floodZone=res.riskLevel;S.floodExp=res.explanation;
    updateFloodUI();
  }catch(e){console.error(e);S.floodLoading=false;const fr=document.getElementById('flood-res');if(fr)fr.innerHTML=`<div style="font-size:12px;color:var(--text3);padding:6px 0"><i class="ti ti-alert-circle"></i> Nie udało się sprawdzić strefy. Sprawdź połączenie i spróbuj ponownie.</div>`;if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-map-pin"></i> Sprawdź strefę';}}
}

function updateFloodUI(){
  const fz=S.floodZone;
  const fcls=fz==='brak'?'fb-ok':fz==='Q500'?'fb-w':'fb-d';
  const flbl=fz==='brak'?'Brak istotnego ryzyka powodziowego':fz==='Q500'?'Strefa zagrożenia Q500 (raz na 500 lat)':'Strefa zagrożenia Q100 (raz na 100 lat)';
  const fico=fz==='brak'?'ti-shield-check':'ti-alert-triangle';
  const fr=document.getElementById('flood-res');
  if(fr)fr.innerHTML=`<span class="fbadge ${fcls}"><i class="ti ${fico}"></i>${flbl}</span><div class="fexp">${esc(S.floodExp)}</div>`;
  if(LMap){const col=fz==='Q100'?'#ef4444':fz==='Q500'?'#f59e0b':'#78a742';LMap.eachLayer(l=>{if(l instanceof L.CircleMarker)LMap.removeLayer(l);});L.circleMarker([S.lat,S.lng],{radius:10,fillColor:col,color:'white',weight:2.5,fillOpacity:1}).addTo(LMap).bindPopup(`<b>${esc(S.addr)}</b><br><small>${flbl}</small>`).openPopup();}
  const btn=document.getElementById('btn-fl');
  if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-refresh"></i> Sprawdź ponownie';}
  updPP();
}

async function loadPackages(){
  if(!S.value||!S.type)return;
  S.pkgLoading=true;
  const ps=document.getElementById('packages-section');
  if(ps)ps.innerHTML=renderPackages();
  const{annual}=calcPrice(S,CFG);
  if(!API_KEY){
    S.packages=[
      {name:'Podstawowy',price:Math.round(annual*0.75),features:['Mury i elementy stałe','Zalanie (standard)','Przepięcie elektryczne'],reason:'Minimalna ochrona bez opcji dodatkowych. Dobra dla ograniczonego budżetu.'},
      {name:'Standard',price:annual,features:[...S.covs].map(k=>cn(k)).slice(0,4),reason:`Rekomendowany dla ${TN[S.type]||'tej nieruchomości'}. Optymalny stosunek ceny do zakresu ochrony.`},
      {name:'Premium',price:Math.round(annual*1.35),features:['Pełny zakres + OC','Assistance 24h Premium','NNW dla domowników','Ubezpieczenie sprzętu'],reason:'Kompleksowa ochrona dla wymagających. Pokrycie również poza nieruchomością.'}
    ];
    S.pkgLoading=false;
    if(ps)ps.innerHTML=renderPackages();
    return;
  }
  try{
    const ar=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,messages:[{role:'user',content:`Stwórz 3 pakiety ubezpieczenia nieruchomości dla:\nTyp: ${TN[S.type]}\nWartość: ${S.value} PLN\nMateriał: ${MN[S.material]}\nRok: ${S.year}\nStrefa powodziowa: ${S.floodZone||'nieznana'}\nAktualny zakres: ${[...S.covs].map(k=>cn(k)).join(', ')}\nSładka aktualna: ${annual} PLN/rok\n\nOdpowiedz TYLKO JSON (bez markdown):\n[{"name":"Podstawowy","price":NUMBER,"features":["cecha 1","cecha 2","cecha 3"],"reason":"jedno zdanie rekomendacji"},{"name":"Standard","price":NUMBER,...},{"name":"Premium","price":NUMBER,...}]\n\nPodstawowy to ok 70% ceny aktualnej, Standard to aktualna cena, Premium to ok 140%.`}]})});
    const ad=await ar.json();
    S.packages=JSON.parse(ad.content[0].text.trim().replace(/```json|```/g,'').trim());
  }catch(e){S.packages=[{name:'Podstawowy',price:Math.round(annual*0.7),features:['Mury','Zalanie','Przepięcie'],reason:'Minimalna ochrona.'},{name:'Standard',price:annual,features:[...S.covs].map(k=>cn(k)),reason:'Aktualny wybór.'},{name:'Premium',price:Math.round(annual*1.4),features:['Pełny zakres + NNW','Assistance Premium'],reason:'Maksymalna ochrona.'}];}
  S.pkgLoading=false;
  if(ps)ps.innerHTML=renderPackages();
}

/* ==================== QUOTES ==================== */
function saveQuote(){
  const{annual}=calcPrice(S,CFG);
  const id=S.savedId||uid();
  S.savedId=id;
  const q={id,type:S.type,addr:S.addr,value:S.value,material:S.material,year:S.year,area:S.area,floodZone:S.floodZone,alarm:S.alarm,monitoring:S.monitoring,doors:S.doors,fire:S.fire,covs:[...S.covs],annual,status:'new',createdAt:new Date().toISOString(),client:''};
  const idx=QUOTES.findIndex(x=>x.id===id);
  if(idx>=0)QUOTES[idx]=q;else QUOTES.unshift(q);
  saveQuotes();
  alert(`Kwotowanie zapisane!\nLink: ${location.origin}/q/${id}\n\nMożesz je znaleźć w zakładce "Moje oferty".`);
}

  const total=QUOTES.length,nw=QUOTES.filter(q=>q.status==='new').length,ct=QUOTES.filter(q=>q.status==='contact').length,cl=QUOTES.filter(q=>q.status==='closed').length;
  const totalVal=QUOTES.reduce((s,q)=>s+q.annual,0);
  statsEl.innerHTML=`
    <div class="stat-card"><div class="stat-n">Wszystkie kwotowania</div><div class="stat-v">${total}</div><div class="stat-sub">od uruchomienia</div></div>

  }
  const prev=calcPrice({type:'dom',material:'mur',year:2005,area:150,value:600000,floodZone:null,alarm:true,monitoring:false,doors:true,fire:false,renovation:false,covs:new Set(['mury','oc','kradziez','zalanie'])},CFG);
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
    <h2 style="font-size:18px;font-weight:700"><i class="ti ti-settings"></i> Konfiguracja produktu</h2>
    <span style="font-size:12px;color:var(--ok-t)"><i class="ti ti-lock-open"></i> Tryb ubezpieczyciela</span>
  </div>
  <div class="cfg-grid">
    <div>
      <div class="card" style="margin-bottom:1rem">
        <div class="cfg-section-title"><i class="ti ti-percentage"></i> Stawki bazowe</div>
        <div class="cfg-row">
          <div class="cfg-row-l"><div class="cfg-row-n">Stawka bazowa</div><div class="cfg-row-d">% wartości nieruchomości rocznie</div></div>
          <div style="text-align:right"><div style="font-size:16px;font-weight:700;color:var(--green)">${(CFG.baseRate*100).toFixed(3)}%</div>
          <input type="range" class="cfg-slider" min="0.05" max="0.50" step="0.01" value="${(CFG.baseRate*100).toFixed(2)}" oninput="CFG.baseRate=parseFloat(this.value)/100;this.previousElementSibling.textContent=parseFloat(this.value).toFixed(3)+'%';refreshCfgPreview()"></div>
        </div>
        <div class="cfg-section-title" style="margin-top:1rem"><i class="ti ti-layers-intersect"></i> Mnożniki materiałowe</div>
        ${Object.entries(CFG.matMult).map(([k,v])=>`<div class="cfg-row"><div class="cfg-row-l"><div class="cfg-row-n">${k.charAt(0).toUpperCase()+k.slice(1)}</div></div><input type="number" class="cfg-input" value="${v}" min="0.5" max="3" step="0.05" oninput="CFG.matMult['${k}']=parseFloat(this.value)||1;refreshCfgPreview()"></div>`).join('')}
        <div class="cfg-section-title" style="margin-top:1rem"><i class="ti ti-calendar"></i> Mnożniki wiekowe</div>
        ${[['pre1945nr','Przed 1945 (bez remontu)'],['pre1945r','Przed 1945 (po remoncie)'],['y45_70','1945–1970'],['y70_00','1970–2000'],['modern','Po 2000']].map(([k,lbl])=>`<div class="cfg-row"><div class="cfg-row-l"><div class="cfg-row-n">${lbl}</div></div><input type="number" class="cfg-input" value="${CFG.ageMult[k]}" min="0.5" max="3" step="0.05" oninput="CFG.ageMult['${k}']=parseFloat(this.value)||1;refreshCfgPreview()"></div>`).join('')}

      <div class="card">
        <div class="cfg-section-title"><i class="ti ti-lock"></i> Rabaty za zabezpieczenia (%)</div>
        ${Object.entries(CFG.secDisc).map(([k,v])=>`<div class="cfg-row"><div class="cfg-row-l"><div class="cfg-row-n">${{alarm:'Alarm',monitoring:'Monitoring 24h',doors:'Drzwi antywłam.',fire:'System p.poż.'}[k]||k}</div></div><input type="number" class="cfg-input" value="${v}" min="0" max="30" step="1" oninput="CFG.secDisc['${k}']=parseInt(this.value)||0;refreshCfgPreview()"></div>`).join('')}

    </div>
    <div>

        <div class="preview-amount" id="cfg-prev-price">${fmt(prev.annual)}</div>
        <div style="font-size:12px;color:var(--green-dd);margin-top:2px">/rok · ${fmt(prev.monthly)}/mies.</div>
        <div style="margin-top:.75rem" id="cfg-prev-lines">${prev.lines.map(l=>`<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--green-dd);padding:2px 0;border-bottom:1px solid rgba(120,167,66,.2)"><span>${l.l}</span><span>${l.t==='dis'?'−'+fmt(-l.v):fmt(l.v)}</span></div>`).join('')}</div>
      </div>
      <div class="card">
        <div class="cfg-section-title"><i class="ti ti-toggle-right"></i> Dostępność opcji</div>
        ${Object.entries(CFG.opts).map(([k,o])=>`<div class="cfg-row">
          <div class="cfg-row-l"><div class="cfg-row-n">${cn(k)}</div><div class="cfg-row-d">${o.fixed?`${o.fixed} zł/rok`:o.pct?`${(o.pct*100).toFixed(3)}% wartości`:''}</div></div>
          <div style="display:flex;align-items:center;gap:8px">
            ${o.fixed!==null?`<input type="number" class="cfg-input" style="width:70px" value="${o.fixed||0}" min="0" step="10" oninput="CFG.opts['${k}'].fixed=parseInt(this.value)||0;refreshCfgPreview()">`:o.pct!==null?`<input type="number" class="cfg-input" style="width:70px" value="${((o.pct||0)*10000).toFixed(1)}" min="0" step="0.1" oninput="CFG.opts['${k}'].pct=parseFloat(this.value)/10000||0;refreshCfgPreview()">²`:''}
            <button class="toggle ${o.on?'on':''}" onclick="CFG.opts['${k}'].on=!CFG.opts['${k}'].on;this.classList.toggle('on');refreshCfgPreview()"></button>
          </div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function unlockCfg(){
  const pw=document.getElementById('cfg-pw')?.value;
  if(pw==='sollers'){CFG_UNLOCKED=true;renderConfig();}
  else alert('Nieprawidłowe hasło.');
}

function refreshCfgPreview(){
  const prev=calcPrice({type:'dom',material:'mur',year:2005,area:150,value:600000,floodZone:null,alarm:true,monitoring:false,doors:true,fire:false,renovation:false,covs:new Set(['mury','oc','kradziez','zalanie'])},CFG);
  const pp=document.getElementById('cfg-prev-price');const pl=document.getElementById('cfg-prev-lines');
  if(pp)pp.textContent=fmt(prev.annual);
  if(pl)pl.innerHTML=prev.lines.map(l=>`<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--green-dd);padding:2px 0;border-bottom:1px solid rgba(120,167,66,.2)"><span>${l.l}</span><span>${l.t==='dis'?'−'+fmt(-l.v):fmt(l.v)}</span></div>`).join('');
  if(S.step===6||S.step<=5)updPP();
}

/* ==================== TABS ==================== */
function showTab(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+tab)?.classList.add('active');
  document.getElementById('tab-'+tab)?.classList.add('active');
  if(tab==='quotes')renderQuotesList();
  if(tab==='agent')renderAgent();
  if(tab==='config')renderConfig();
}

/* ==================== DARK MODE ==================== */
function toggleDark(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('dark-icon').className=isDark?'ti ti-moon':'ti ti-sun';
  localStorage.setItem('si_theme',isDark?'light':'dark');
}

function resetCalc(){
  if(LMap){LMap.remove();LMap=null;}
  Object.assign(S,{step:1,type:null,addr:'',lat:null,lng:null,city:'',floodZone:null,floodExp:'',floodLoading:false,year:1990,material:'mur',area:120,value:500000,floors:2,renovation:false,alarm:false,monitoring:false,doors:false,fire:false,covs:new Set(['mury']),packages:null,pkgLoading:false,payPeriod:'annual',savedId:null});
}
